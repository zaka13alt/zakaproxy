    <style>
        /* Top Navigation Bar styles */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 20px;
            gap: 20px;
            background: rgba(0, 0, 0, 0.2);
        }

            cursor: pointer;
            height: 32px;
            width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .nav-icon:hover {
            transform: scale(1.1);
        }

        .nav-icon img {
            width: 100%;
            height: 100%;
        }

        .nav-icon i {
            font-size: 28px;
            color: #fff;
        }

        /* Hidden Settings Modal/Div styles */
        #settings-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Open Sans', sans-serif;
        }

        .settings-content {
            background: #1e1e24;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: #fff;
        }

        .settings-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a35;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: #3e3e4f;
        }

        .placeholder-btn {
            background: #332a42;
            border-color: #553e70;
        }

        .placeholder-btn:hover {
            background: #46395c;
        }
    </style>

    <script>
        window.onload = function () {
            if (!localStorage.getItem("discordAlertShown")) {
                alert("Hi!");
                localStorage.setItem("discordAlertShown", "true");
            }
        };

        // 
        function openSettings() {
            document.getElementById('settings-overlay').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-overlay').style.display = 'none';
        }

        //
        function clearCache() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        for (let name of names) {
                            caches.delete(name);
                        }
                    });
                }
                alert("Storage cache and local data cleared! The page will now reload.");
                location.reload();
            } catch (err) {
                alert("Failed to fully clear cache: " + err);
            }
        }

        // 2. Unregister Service Workers and reload
        function unregisterServiceWorkers() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    if (registrations.length === 0) {
                        alert("No service workers found registered!");
                        return;
                    }
                    
                    let unregisterPromises = registrations.map(registration => registration.unregister());
                    
                    Promise.all(unregisterPromises).then(() => {
                        alert("All Service Workers successfully unregistered! Reloading site...");
                        location.reload();
                    }).catch(err => {
                        alert("Error unregistering service workers: " + err);
                    });
                });
            } else {
                alert("Service workers are not supported by this browser.");
            }
        }

        function aboutApp() {
            alert("Zakaproxy 1.0.0, Ultraviolet + Bare Powered!");
        }

        // 
        function handlePlaceholderClick() {
            alert(".");
        }

        // 
        let escapeCount = 0;
        let escapeTimer;

        window.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                escapeCount++;
                
                // 
                clearTimeout(escapeTimer);
                escapeTimer = setTimeout(() => {
                    escapeCount = 0;
                }, 1500);

                if (escapeCount >= 3) {
                    window.location.href = '/ixl.html';
                }
            }
        });
    </script>
